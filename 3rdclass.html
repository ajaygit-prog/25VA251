<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Employee Salary Management</title>

    <style>
        body {
            font-family: Arial;
            padding: 20px;
            background: #f5f5f5;
        }

        h2 {
            text-align: center;
        }

        input,
        button {
            padding: 8px;
            margin: 5px;
        }

        button {
            cursor: pointer;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
        }

        button:hover {
            background: #0056b3;
        }

        #output {
            margin-top: 20px;
            padding: 10px;
            background: white;
            border-radius: 5px;
        }
    </style>
</head>

<body>

    <h2>Employee Salary Management System</h2>

    <input type="text" id="name" placeholder="Employee Name">
    <input type="text" id="id" placeholder="Employee ID">
    <input type="number" id="salary" placeholder="Salary">
    <input type="text" id="dept" placeholder="Department">

    <br>

    <button onclick="addEmployee()">Add Employee</button>
    <button onclick="displayEmployees()">Display All</button>
    <button onclick="filterSalary()">Salary > 50000</button>
    <button onclick="totalSalary()">Total Salary</button>
    <button onclick="averageSalary()">Average Salary</button>
    <button onclick="countDept()">Count by Dept</button>

    <div id="output"></div>

    <script>
        let employees = [];

        function addEmployee() {
            let name = document.getElementById("name").value;
            let id = document.getElementById("id").value;
            let salary = Number(document.getElementById("salary").value);
            let dept = document.getElementById("dept").value;

            if (name && id && salary && dept) {
                employees.push({ name, id, salary, dept });
                alert("Employee Added!");
            } else {
                alert("Fill all fields!");
            }
        }

        function displayEmployees() {
            let output = "<h3>All Employees</h3>";
            employees.forEach(emp => {
                output += Name: ${ emp.name }, Salary: ₹${ emp.salary }, Dept: ${ emp.dept } <br>;
        });
                    document.getElementById("output").innerHTML = output;
    }

                    function filterSalary() {
                        let filtered = employees.filter(emp => emp.salary > 50000);
                    let output = "<h3>Salary > 50000</h3>";

        filtered.forEach(emp => {
                        output += Name: ${emp.name}, Salary: ₹${emp.salary}<br>;
        });

                            document.getElementById("output").innerHTML = output;
    }

                            function totalSalary() {
                            let total = employees.reduce((sum, emp) => sum + emp.salary, 0);
                        document.getElementById("output").innerHTML =
                        <h3>Total Salary: ₹${total}</h3>;
    }

                        function averageSalary() {
                            let total = employees.reduce((sum, emp) => sum + emp.salary, 0);
                        let avg = employees.length ? (total / employees.length) : 0;

                        document.getElementById("output").innerHTML =
                        <h3>Average Salary: ₹${avg.toFixed(2)}</h3>;
    }

                        function countDept() {
                            let dept = prompt("Enter Department Name:");
        let count = employees.filter(emp => emp.dept === dept).length;

                        document.getElementById("output").innerHTML =
                        <h3>Employees in ${dept}: ${count}</h3>;
    }
    </script>

</body>

</html>
