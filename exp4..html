<!DOCTYPE html>
<html>

<head>
    <title>JS Input Example</title>
</head>

<body>
    <h2>Number Checker</h2>
    <button onclick="runProgram()">Start Program</button>

    <script>
        function runProgram() {
            // Take user input
            let num = parseInt(prompt("Enter a number between 1 and 20:"));

            // Condition check
            if (isNaN(num)) {
                alert("That's not a valid number!");
                return;
            }

            if (num % 2 === 0) {
                alert(num + " is even.");
            } else {
                alert(num + " is odd.");
            }

            // Loop example: print multiplication table
            let result = "Multiplication table for " + num + ":\n";
            for (let i = 1; i <= 10; i++) {
                result += num + " x " + i + " = " + (num * i) + "\n";
            }

            alert(result);
        }
    </script>
</body>

</html>
