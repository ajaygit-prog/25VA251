<!DOCTYPE html>
<html>
<head>
    <title>JavaScript Events Demo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 50px;
        }
        #message {
            font-size: 24px;
            margin: 20px;
        }
    </style>
</head>
<body>

    <h2>Dynamic Content Change</h2>

    <input type="text" id="userInput" placeholder="Enter text here">

    <br><br>

    <button id="updateBtn">Update Text</button>
    <button id="clearBtn">Clear</button>

    <p id="message">Your text will appear here.</p>

    <script>
        // Update content when button is clicked
        document.getElementById("updateBtn").addEventListener("click", function() {
            let text = document.getElementById("userInput").value;
            document.getElementById("message").textContent = text;
        });

        // Clear input and content
        document.getElementById("clearBtn").addEventListener("click", function() {
            document.getElementById("userInput").value = "";
            document.getElementById("message").textContent = "Your text will appear here.";
        });
    </script>

</body>
</html>
